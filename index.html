<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 Mi Jardín — Curso de Jardinería</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde-oscuro: #2d5016;
    --verde-medio: #4a7c2f;
    --verde-claro: #7db547;
    --verde-suave: #b8d99a;
    --crema: #f5f0e8;
    --tierra: #8b5e3c;
    --tierra-claro: #c49a6c;
    --beige: #ede8de;
    --blanco: #fdfcf9;
    --sombra: rgba(45,80,22,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background-color: var(--crema);
    color: var(--verde-oscuro);
    min-height: 100vh;
  }

  /* PANTALLA DE BIENVENIDA */
  #pantalla-bienvenida {
    min-height: 100vh;
    background: linear-gradient(160deg, #1a3a06 0%, #2d5016 40%, #4a7c2f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  #pantalla-bienvenida::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(ellipse at 20% 80%, rgba(123,181,71,0.2) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 20%, rgba(123,181,71,0.15) 0%, transparent 50%);
  }

  .hojas-deco {
    position: absolute;
    font-size: 8rem;
    opacity: 0.07;
    pointer-events: none;
  }
  .hoja-1 { top: -2rem; left: -2rem; transform: rotate(-20deg); }
  .hoja-2 { bottom: -2rem; right: -2rem; transform: rotate(30deg); }
  .hoja-3 { top: 30%; right: 5%; font-size: 5rem; transform: rotate(15deg); }

  .bienvenida-contenido {
    position: relative;
    z-index: 2;
    max-width: 600px;
  }

  .emoji-grande {
    font-size: 5rem;
    display: block;
    margin-bottom: 1rem;
    animation: flotar 3s ease-in-out infinite;
  }

  @keyframes flotar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .bienvenida-contenido h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .bienvenida-contenido h1 span {
    color: var(--verde-suave);
    font-style: italic;
  }

  .bienvenida-contenido p {
    color: rgba(255,255,255,0.8);
    font-size: 1.1rem;
    margin-bottom: 2rem;
    line-height: 1.7;
  }

  .btn-empezar {
    background: var(--verde-claro);
    color: #fff;
    border: none;
    padding: 1rem 3rem;
    border-radius: 50px;
    font-size: 1.1rem;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    transition: all 0.3s;
  }
  .btn-empezar:hover {
    background: var(--verde-suave);
    color: var(--verde-oscuro);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .niveles-preview {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nivel-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 0.4rem 1rem;
    color: rgba(255,255,255,0.9);
    font-size: 0.85rem;
  }

  /* APP PRINCIPAL */
  #app { display: none; }

  /* HEADER */
  .header {
    background: var(--verde-oscuro);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header-logo {
    font-family: 'Playfair Display', serif;
    color: var(--verde-suave);
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .header-progreso {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: rgba(255,255,255,0.8);
    font-size: 0.9rem;
  }

  .barra-progreso-global {
    width: 120px;
    height: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
  }

  .barra-progreso-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--verde-claro), var(--verde-suave));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* NAV DE MÓDULOS */
  .nav-modulos {
    background: var(--beige);
    border-bottom: 2px solid var(--verde-suave);
    padding: 0 2rem;
    display: flex;
    overflow-x: auto;
    gap: 0;
    scrollbar-width: none;
  }
  .nav-modulos::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 1rem 1.5rem;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--tierra);
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .nav-tab:hover { color: var(--verde-medio); }

  .nav-tab.activo {
    color: var(--verde-oscuro);
    border-bottom-color: var(--verde-claro);
  }

  .nav-tab .check-tab {
    background: var(--verde-claro);
    color: white;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 0.6rem;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .nav-tab.completado .check-tab { display: flex; }

  /* CONTENIDO PRINCIPAL */
  .contenido-principal {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* TARJETA DE MÓDULO */
  .modulo-header {
    background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-medio));
    border-radius: 20px;
    padding: 2rem;
    color: white;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }

  .modulo-header::after {
    content: attr(data-emoji);
    position: absolute;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 5rem;
    opacity: 0.2;
  }

  .nivel-tag {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .modulo-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .modulo-header p {
    opacity: 0.85;
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 500px;
  }

  /* SECCIONES */
  .seccion {
    background: var(--blanco);
    border-radius: 16px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    box-shadow: 0 2px 20px var(--sombra);
    border: 1px solid rgba(123,181,71,0.15);
  }

  .seccion-header {
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--blanco);
    transition: background 0.2s;
  }

  .seccion-header:hover { background: #f8f5ee; }

  .seccion-titulo {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-weight: 700;
    font-size: 1rem;
    color: var(--verde-oscuro);
  }

  .seccion-icono {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--verde-claro), var(--verde-medio));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .chevron {
    color: var(--verde-medio);
    transition: transform 0.3s;
    font-size: 1.2rem;
  }

  .seccion-header.abierta .chevron { transform: rotate(180deg); }

  .seccion-contenido {
    display: none;
    padding: 0 1.5rem 1.5rem;
    border-top: 1px solid var(--beige);
  }

  .seccion-contenido.abierto { display: block; }

  /* VIDEO EMBEBIDO */
  .video-contenedor {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    margin: 1rem 0;
  }

  .video-contenedor iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .video-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a3a06, #2d5016);
    color: white;
    cursor: pointer;
    transition: all 0.3s;
  }

  .video-placeholder:hover { background: linear-gradient(135deg, #2d5016, #4a7c2f); }

  .play-btn {
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin-bottom: 1rem;
    transition: transform 0.2s;
  }

  .video-placeholder:hover .play-btn { transform: scale(1.1); }

  .video-placeholder p {
    font-size: 0.9rem;
    opacity: 0.8;
    text-align: center;
    padding: 0 2rem;
  }

  .video-placeholder small {
    margin-top: 0.5rem;
    opacity: 0.6;
    font-size: 0.75rem;
  }

  /* TEXTO LECCIÓN */
  .leccion-texto {
    color: #444;
    line-height: 1.8;
    font-size: 0.95rem;
    margin: 1rem 0;
  }

  .tip-box {
    background: linear-gradient(135deg, #f0f9e8, #e8f5d8);
    border-left: 4px solid var(--verde-claro);
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.2rem;
    margin: 1rem 0;
    font-size: 0.9rem;
    color: var(--verde-oscuro);
  }

  .tip-box strong { display: block; margin-bottom: 0.3rem; }

  .alerta-box {
    background: #fff8e8;
    border-left: 4px solid var(--tierra-claro);
    border-radius: 0 10px 10px 0;
    padding: 1rem 1.2rem;
    margin: 1rem 0;
    font-size: 0.9rem;
    color: #6b4217;
  }

  /* LISTA DE PLANTAS */
  .plantas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }

  .planta-card {
    background: var(--crema);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    border: 1px solid var(--verde-suave);
    transition: all 0.2s;
  }

  .planta-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px var(--sombra);
  }

  .planta-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }
  .planta-card .nombre { font-weight: 700; font-size: 0.85rem; color: var(--verde-oscuro); }
  .planta-card .dificultad { font-size: 0.75rem; color: var(--tierra); }

  /* QUIZ */
  .quiz-contenedor {
    background: var(--crema);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1rem 0;
    border: 2px solid var(--verde-suave);
  }

  .quiz-pregunta {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 1rem;
    color: var(--verde-oscuro);
  }

  .quiz-opciones {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .quiz-opcion {
    background: white;
    border: 2px solid var(--verde-suave);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
    text-align: left;
    color: var(--verde-oscuro);
  }

  .quiz-opcion:hover { border-color: var(--verde-claro); background: #f5faea; }
  .quiz-opcion.correcta { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
  .quiz-opcion.incorrecta { border-color: #f44336; background: #ffebee; color: #c62828; }

  .quiz-resultado {
    margin-top: 1rem;
    padding: 0.8rem;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.9rem;
    display: none;
  }

  .quiz-resultado.correcto { background: #e8f5e9; color: #2e7d32; display: block; }
  .quiz-resultado.incorrecto { background: #ffebee; color: #c62828; display: block; }

  /* BTN COMPLETAR */
  .btn-completar {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--verde-claro), var(--verde-medio));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }

  .btn-completar:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(74,124,47,0.4);
  }

  .btn-completar:disabled {
    background: #ccc;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-completar.completado-btn {
    background: linear-gradient(135deg, #4caf50, #2e7d32);
  }

  /* PROGRESO MÓDULO */
  .progreso-modulo {
    background: white;
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--verde-suave);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progreso-modulo .barra {
    flex: 1;
    height: 10px;
    background: var(--beige);
    border-radius: 5px;
    overflow: hidden;
  }

  .progreso-modulo .fill {
    height: 100%;
    background: linear-gradient(90deg, var(--verde-claro), var(--verde-suave));
    border-radius: 5px;
    transition: width 0.5s;
  }

  .progreso-texto { font-size: 0.85rem; color: var(--verde-medio); font-weight: 700; white-space: nowrap; }

  /* HERRAMIENTAS */
  .herramientas-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 1rem;
    margin: 1rem 0;
  }

  .herramienta-item {
    background: var(--crema);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    border: 1px solid var(--verde-suave);
  }

  .herramienta-item .emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
  .herramienta-item .nombre { font-weight: 700; font-size: 0.8rem; color: var(--verde-oscuro); }
  .herramienta-item .uso { font-size: 0.72rem; color: #888; margin-top: 0.2rem; }

  /* CHECKLIST */
  .checklist {
    list-style: none;
    margin: 1rem 0;
  }

  .checklist li {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--beige);
    font-size: 0.9rem;
    cursor: pointer;
  }

  .checklist li:last-child { border-bottom: none; }

  .check-box {
    width: 20px;
    height: 20px;
    border: 2px solid var(--verde-claro);
    border-radius: 5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    font-size: 0.8rem;
  }

  .checklist li.marcado .check-box {
    background: var(--verde-claro);
    color: white;
  }

  .checklist li.marcado span { text-decoration: line-through; color: #999; }

  /* PANTALLA FINAL */
  #pantalla-final {
    display: none;
    min-height: 60vh;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 2rem;
    flex-direction: column;
  }

  .certificado {
    background: linear-gradient(135deg, var(--crema), var(--beige));
    border: 3px solid var(--verde-claro);
    border-radius: 20px;
    padding: 3rem;
    max-width: 500px;
    box-shadow: 0 20px 60px var(--sombra);
  }

  .certificado h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--verde-oscuro);
    margin: 1rem 0 0.5rem;
  }

  .certificado p {
    color: var(--tierra);
    font-size: 0.95rem;
    line-height: 1.7;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .bienvenida-contenido h1 { font-size: 2rem; }
    .contenido-principal { padding: 1rem; }
    .modulo-header h2 { font-size: 1.5rem; }
    .plantas-grid { grid-template-columns: repeat(2, 1fr); }
    .herramientas-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ANIMACIONES DE ENTRADA */
  .fade-in {
    animation: fadeIn 0.5s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .confetti-emoji {
    font-size: 3rem;
    animation: flotar 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<!-- PANTALLA DE BIENVENIDA -->
<div id="pantalla-bienvenida">
  <div class="hojas-deco hoja-1">🍃</div>
  <div class="hojas-deco hoja-2">🌿</div>
  <div class="hojas-deco hoja-3">🌱</div>
  <div class="bienvenida-contenido">
    <span class="emoji-grande">🌸</span>
    <h1>Mi <span>Jardín</span><br>Florece</h1>
    <p>Un curso completo de jardinería pensado con amor, desde los primeros pasos hasta técnicas avanzadas. ¡Aprende a tu ritmo y hace florecer tu jardín!</p>
    <button class="btn-empezar" onclick="iniciarCurso()">🌱 Comenzar el Curso</button>
    <div class="niveles-preview">
      <div class="nivel-badge">🌱 Principiante</div>
      <div class="nivel-badge">🌿 Intermedio</div>
      <div class="nivel-badge">🌳 Avanzado</div>
    </div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <header class="header">
    <div class="header-logo">🌿 Mi Jardín</div>
    <div class="header-progreso">
      <span id="texto-progreso-global">0% completado</span>
      <div class="barra-progreso-global">
        <div class="barra-progreso-fill" id="fill-global" style="width:0%"></div>
      </div>
    </div>
  </header>

  <nav class="nav-modulos" id="nav-modulos"></nav>

  <main class="contenido-principal" id="contenido-modulo"></main>
</div>

<script>
// DATOS DEL CURSO

      {

            { emoji: '🥄', nombre: 'Palita', uso: 'Plantar y trasplantar' },
            { emoji: '✂️', nombre: 'Tijeras', uso: 'Podar y cortar' },
            { emoji: '🧤', nombre: 'Guantes', uso: 'Proteger tus manos' },
            { emoji: '💧', nombre: 'Spray', uso: 'Humedecer hojas' },
          ],
          tip: '💡 Consejo: Comenzá con herramientas simples y de buena calidad. Es mejor tener pocas cosas buenas que muchas de mala calidad.'
        }
      },
      {
        titulo: 'Video: Introducción a la Jardinería',
        icono: '▶️',
        tipo: 'video',
        contenido: {
          videoId: 'kFkSH3JcHWA',
          titulo: 'Jardinería para Principiantes — Todo lo que necesitás saber',
          descripcion: 'Los conceptos básicos explicados de forma simple para empezar bien desde el principio.',
          texto: 'En este video vas a aprender: los tipos de suelo, cómo preparar tu primera maceta y los errores más comunes que hay que evitar al comenzar.',
          tip: '🌿 Mirá el video completo y después respondé el quiz para reforzar lo aprendido.'
        }
      },
      {
        titulo: 'Tipos de suelo para plantas',
        icono: '🌍',

// ESTADO
const estado = {
  moduloActual: 0,
  progreso: modulos.map(m => ({
    completado: false,
    seccionesAbiertas: new Set(),
    checklistMarcados: new Set(),
    quizRespondido: false
  }))
};

function calcularProgresoGlobal() {
  const completados = estado.progreso.filter(p => p.completado).length;
  return Math.round((completados / modulos.length) * 100);
}

function actualizarProgresoGlobal() {
  const pct = calcularProgresoGlobal();
  document.getElementById('fill-global').style.width = pct + '%';
  document.getElementById('texto-progreso-global').textContent = pct + '% completado';
}

function iniciarCurso() {
  document.getElementById('pantalla-bienvenida').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderizarNav();
  renderizarModulo(0);
}

function renderizarNav() {
  const nav = document.getElementById('nav-modulos');
  nav.innerHTML = modulos.map((m, i) => `
    <div class="nav-tab ${i === estado.moduloActual ? 'activo' : ''} ${estado.progreso[i].completado ? 'completado' : ''}" 
         onclick="cambiarModulo(${i})">
      ${m.emoji} ${m.titulo}
      <span class="check-tab">✓</span>
    </div>
  `).join('');
}

function cambiarModulo(idx) {
  estado.moduloActual = idx;
  renderizarNav();
  renderizarModulo(idx);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderizarModulo(idx) {
  const m = modulos[idx];
  const pEstado = estado.progreso[idx];
  const pct = pEstado.completado ? 100 : 0;

  let html = `
    <div class="modulo-header fade-in" data-emoji="${m.emoji}" style="background: linear-gradient(135deg, ${m.color}, ${ajustarColor(m.color)})">
      <div class="nivel-tag">${m.nivel}</div>
      <h2>${m.emoji} ${m.titulo}</h2>
      <p>${m.descripcion}</p>
    </div>
    <div class="progreso-modulo fade-in">
      <span class="progreso-texto">${pEstado.completado ? '✅ Completado' : 'Mi progreso'}</span>
      <div class="barra"><div class="fill" id="fill-modulo-${idx}" style="width:${pct}%"></div></div>
    </div>
  `;

  m.secciones.forEach((s, si) => {
    html += renderizarSeccion(s, idx, si);
  });

  html += `
    <button class="btn-completar ${pEstado.completado ? 'completado-btn' : ''}" 
            id="btn-completar-${idx}"
            onclick="completarModulo(${idx})"
            ${pEstado.completado ? 'disabled' : ''}>
      ${pEstado.completado ? '✅ Módulo completado' : '🌱 Marcar módulo como completado'}
    </button>
  `;

  document.getElementById('contenido-modulo').innerHTML = html;
}

      <div class="tip-box"><strong>🌱 Recomendación:</strong> ${s.contenido.tip}</div>
    `;
  } else if (s.tipo === 'checklist') {
    const items = s.contenido.items.map((item, ii) => {
      const marcado = estado.progreso[midx].checklistMarcados.has(`${sidx}-${ii}`);
      return `
        <li class="${marcado ? 'marcado' : ''}" onclick="toggleCheck(${midx}, ${sidx}, ${ii}, this)">
          <div class="check-box">${marcado ? '✓' : ''}</div>
          <span>${item}</span>
        </li>
      `;
    }).join('');
    contenidoHtml = `
      <p class="leccion-texto"><strong>${s.contenido.titulo}</strong></p>
      <ul class="checklist">${items}</ul>
    `;
  } else if (s.tipo === 'quiz') {
    const respondido = estado.progreso[midx].quizRespondido;
    const opciones = s.contenido.opciones.map((op, oi) => `
      <button class="quiz-opcion" id="opcion-${midx}-${oi}" 
              onclick="responderQuiz(${midx}, ${oi}, ${s.contenido.correcta}, '${s.contenido.explicacion.replace(/'/g, "\\'")}')">
        ${op}
      </button>
    `).join('');
    contenidoHtml = `
      <div class="quiz-contenedor">
        <div class="quiz-pregunta">🤔 ${s.contenido.pregunta}</div>
        <div class="quiz-opciones">${opciones}</div>
        <div class="quiz-resultado" id="quiz-resultado-${midx}"></div>
      </div>
    `;
  }

  return `
    <div class="seccion fade-in">
      <div class="seccion-header ${abierta ? 'abierta' : ''}" onclick="toggleSeccion(${midx}, ${sidx}, this)">
        <div class="seccion-titulo">
          <div class="seccion-icono">${s.icono}</div>
          ${s.titulo}
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="seccion-contenido ${abierta ? 'abierto' : ''}">
        ${contenidoHtml}
      </div>
    </div>
  `;
}

function toggleSeccion(midx, sidx, headerEl) {
  const contenido = headerEl.nextElementSibling;
  const abierta = contenido.classList.toggle('abierto');
  headerEl.classList.toggle('abierta', abierta);
  if (abierta) {
    estado.progreso[midx].seccionesAbiertas.add(sidx);
  } else {
    estado.progreso[midx].seccionesAbiertas.delete(sidx);
  }
}

function cargarVideo(videoId, midx, sidx) {
  const cont = document.getElementById(`video-${midx}-${sidx}`);
  cont.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen></iframe>`;
}

function toggleCheck(midx, sidx, ii, li) {
  const key = `${sidx}-${ii}`;
  const marcados = estado.progreso[midx].checklistMarcados;
  const checkBox = li.querySelector('.check-box');
  if (marcados.has(key)) {
    marcados.delete(key);
    li.classList.remove('marcado');
    checkBox.textContent = '';
  } else {
    marcados.add(key);
    li.classList.add('marcado');
    checkBox.textContent = '✓';
  }
}

function responderQuiz(midx, elegida, correcta, explicacion) {
  const opciones = document.querySelectorAll(`[id^="opcion-${midx}-"]`);
  opciones.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correcta) btn.classList.add('correcta');
    else if (i === elegida) btn.classList.add('incorrecta');
  });

  const resultado = document.getElementById(`quiz-resultado-${midx}`);
  if (elegida === correcta) {
    resultado.className = 'quiz-resultado correcto';
    resultado.textContent = '✅ ' + explicacion;
  } else {
    resultado.className = 'quiz-resultado incorrecto';
    resultado.textContent = '❌ No era esa. ' + explicacion;
  }
  estado.progreso[midx].quizRespondido = true;
}

function completarModulo(idx) {
  estado.progreso[idx].completado = true;
  const btn = document.getElementById(`btn-completar-${idx}`);
  btn.disabled = true;
  btn.classList.add('completado-btn');
  btn.textContent = '✅ Módulo completado';

  const fill = document.getElementById(`fill-modulo-${idx}`);
  if (fill) fill.style.width = '100%';

  renderizarNav();
  actualizarProgresoGlobal();

  // Si completó todos
  const todos = estado.progreso.every(p => p.completado);
  if (todos) {
    setTimeout(() => mostrarPantallaFinal(), 800);
  } else {
    // Sugerir siguiente módulo
    const siguiente = idx + 1;
    if (siguiente < modulos.length) {
      setTimeout(() => cambiarModulo(siguiente), 1000);
    }
  }
}

function mostrarPantallaFinal() {
  const contenido = document.getElementById('contenido-modulo');
  contenido.innerHTML = `
    <div style="text-align:center; padding:3rem 1rem;">
      <div class="confetti-emoji">🏆</div>
      <div style="font-size:3rem; margin:1rem 0;">🌸🌻🌺🌷🌼</div>
      <div style="background: linear-gradient(135deg, #f5f0e8, #ede8de); border: 3px solid #7db547; border-radius: 20px; padding: 2.5rem; max-width: 500px; margin: 0 auto; box-shadow: 0 20px 60px rgba(45,80,22,0.15);">
        <div style="font-size:1.5rem; margin-bottom:1rem">🎓</div>
        <h2 style="font-family:'Playfair Display',serif; font-size:1.8rem; color:#2d5016; margin-bottom:0.8rem">¡Curso completado!</h2>
        <p style="color:#8b5e3c; font-size:1rem; line-height:1.7; margin-bottom:1.5rem">
          Felicitaciones, completaste el curso completo de jardinería. Ahora tenés todas las herramientas para hacer florecer cualquier jardín. ¡Seguí practicando y disfrutando de tus plantas! 🌱
        </p>
        <div style="background:#fff; border-radius:12px; padding:1rem; font-size:2rem">
          🌱🪴🌿🌻🌳
        </div>
        <p style="margin-top:1rem; font-size:0.85rem; color:#999">Con amor, tu jardín te espera 💚</p>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function ajustarColor(hex) {
  // Aclarar levemente el color para el gradiente
  return hex;
}

// Iniciar
actualizarProgresoGlobal();
</script>
